    <script>
      window.LECTURE = {
        course: "BA1202 · Consumer behavior I",
        title: "Lecture 6",
        subtitle: "Utility & how people choose — gentle version",
        slideDeck: "lecture6",
        slideSourceLabel: "Lecture-6.pptx.pdf",
        slidePages: [2, 4, 7, 11, 12, 17, 8, 8, 10, 15],
        steps: [
          {
            title: "What this lecture is about",
            lead: "We connect feelings of satisfaction to demand curves.",
            blocks: [
              { type: "p", text: "Consumers have limited money but many wants. They try to pick bundles that make them as satisfied as possible." },
            ],
            viz: "welcome",
          },
          {
            title: "Consumer behavior — simple definition",
            lead: "How people decide what to buy, when, and from whom.",
            blocks: [
              {
                type: "p",
                text: "It studies the steps people use to search, buy, use, and replace products and services to meet needs.",
              },
            ],
            viz: "market",
          },
          {
            title: "Utility = satisfaction power",
            lead: "Utility is not the same as usefulness in everyday speech.",
            blocks: [
              { type: "p", text: "Utility is want-satisfying power — the pleasure or satisfaction from consuming something." },
              {
                type: "ul",
                text: [
                  "A Picasso can have huge utility to a fan but be “useless” for hammering nails.",
                  "Utility is subjective — different people feel different joy from the same item.",
                  "We often pretend we can count utils just to illustrate ideas.",
                ],
              },
            ],
            viz: "utilitySteps",
          },
          {
            title: "Law of diminishing marginal utility",
            lead: "Each extra unit adds less extra happiness than the one before.",
            blocks: [
              {
                type: "p",
                text: "First car feels life-changing. Second car is nice. By the fifth car, the extra happiness per car is small for most people.",
              },
            ],
            viz: "utilitySteps",
            vizCaption: "Marginal utility slopes down as you consume more.",
          },
          {
            title: "Total utility vs marginal utility",
            lead: "Total = all satisfaction so far. Marginal = satisfaction from the next unit.",
            blocks: [
              { type: "p", text: "When marginal utility is positive but falling, total utility still rises — just more slowly." },
              { type: "tip", text: "When marginal utility hits zero, total utility is usually at its peak for that good (holding other stuff fixed)." },
            ],
            viz: "marginal",
          },
          {
            title: "Why demand curves slope down (intuition)",
            lead: "You are willing to pay less for the 5th slice than the 1st — satisfaction from extras drops.",
            blocks: [{ type: "p", text: "Lower willingness to pay for additional units links to diminishing marginal utility." }],
            viz: "demandCurve",
          },
          {
            title: "Cardinal utility theory",
            lead: "Old-school idea: happiness has measurable numbers.",
            blocks: [
              {
                type: "p",
                text: "Cardinal utility assumes you can say “this pizza gives me 100 utils” like measuring temperature.",
              },
            ],
            viz: "cardinalOrdinal",
          },
          {
            title: "Ordinal utility theory",
            lead: "Modern-friendly idea: you can rank bundles without exact utils.",
            blocks: [
              {
                type: "p",
                text: "Ordinal utility only needs: A is preferred to B. You do not need to know by how many utils.",
              },
            ],
            viz: "cardinalOrdinal",
          },
          {
            title: "Assumptions (do not panic)",
            lead: "Models simplify so we can see patterns.",
            blocks: [
              {
                type: "ul",
                text: [
                  "Consumers are purposeful — they try to get what they like.",
                  "Preferences are somewhat stable in the short run.",
                  "More is preferred to less (for “goods,” not bads).",
                ],
              },
            ],
            viz: "welcome",
          },
          {
            title: "Exceptions / limits",
            lead: "Real humans are messy — the model is a starting map.",
            blocks: [
              { type: "p", text: "Habits, addiction, mental bandwidth, and social pressure can break simple stories." },
            ],
            viz: "positiveNormative",
            vizCaption: "Models vs messy reality — both matter.",
          },
        ],
