      <div class="stepper-track" aria-hidden="true"><div class="stepper-fill" id="stepper-fill"></div></div>

        <span>Step <span id="step-current">1</span> / <span id="step-total">1</span></span>

    <nav class="nav-bar" aria-label="Step navigation">

        <button type="button" class="nav-btn nav-btn-primary" id="btn-next">Next →</button>
      </div>
    </nav>
    <script>
      window.LECTURE = {
        course: "AF 2405 · Demand and supply",
        title: "Demand & supply",
        subtitle: "Markets, curves, equilibrium — calm version",
        steps: [
          {
            title: "What is a market?",
            lead: "A market is not only a physical place — it is any setup where buyers and sellers meet.",
            blocks: [
              { type: "p", text: "A market is a group of buyers and sellers of a particular good or service." },
              { type: "p", text: "Examples: wheat market, apartment rentals, online app stores — same idea." },
            ],
            viz: "market",
          },
          {
            title: "Competitive market (many small players)",
            lead: "No single buyer or seller can push the price around alone.",
            blocks: [
              {
                type: "p",
                text: "A competitive market has many buyers and sellers, so each side is tiny compared to the whole market.",
              },
              { type: "tip", text: "If you are modeling wheat or stocks, “competitive” is often a useful first guess." },
            ],
            viz: "market",
            vizCaption: "Many buyers + many sellers → price feels “given” to each person.",
          },
          {
            title: "Demand in plain English",
            lead: "Demand is not one number — it is a whole relationship between price and quantity.",
            blocks: [
              {
                type: "p",
                text: "Demand shows how much consumers are willing and able to buy at different prices during a period.",
              },
              { type: "p", text: "Willing = they want it. Able = they can pay for it. Both matter." },
            ],
            viz: "demandCurve",
          },
          {
            title: "Supply in plain English",
            lead: "Supply is what producers are willing to bring to market at different prices.",
            blocks: [
              {
                type: "p",
                text: "Supply shows how much producers will offer for sale at different prices during a period.",
              },
            ],
            viz: "supplyCurve",
          },
          {
            title: "Law of demand",
            lead: "If price goes up, quantity demanded usually goes down — other things equal.",
            blocks: [
              { type: "p", text: "Other things equal (ceteris paribus) means we hold income, tastes, and related prices fixed for a moment." },
              { type: "p", text: "Higher price → fewer people buy, or people buy less." },
            ],
            viz: "demandCurve",
            vizCaption: "Downward slope: price up, quantity demanded down.",
          },
          {
            title: "Law of supply",
            lead: "If price goes up, quantity supplied usually goes up — other things equal.",
            blocks: [
              { type: "p", text: "Higher prices make production more attractive, so firms supply more." },
              { type: "p", text: "Lower prices → less incentive → smaller quantity supplied." },
            ],
            viz: "supplyCurve",
            vizCaption: "Upward slope: price up, quantity supplied up.",
          },
          {
            title: "Graph: demand curve (D)",
            lead: "Price on the vertical axis, quantity on the horizontal axis — weird at first, you get used to it.",
            blocks: [{ type: "p", text: "Each point on D is a price–quantity pair people would choose." }],
            viz: "demandCurve",
          },
          {
            title: "Graph: supply curve (S)",
            lead: "Same axes — now producers’ side.",
            blocks: [{ type: "p", text: "Each point on S is a price–quantity pair firms would sell." }],
            viz: "supplyCurve",
          },
          {
            title: "Equilibrium: where plans match",
            lead: "The crossing point is special: quantity demanded equals quantity supplied.",
            blocks: [
              { type: "p", text: "Equilibrium price clears the market — no automatic shortage or surplus at that price." },
              { type: "tip", text: "If price is too high, surplus builds. Too low, shortage builds. The story pushes price toward equilibrium." },
            ],
            viz: "equilibrium",
            vizCaption: "Intersection → equilibrium price P* and quantity Q*.",
          },
          {
            title: "Shifts vs movements along the curve",
            lead: "Price change moves you along the curve. Other shocks shift the whole curve.",
            blocks: [
              { type: "ul", text: ["Movement along D: the good’s own price changed.", "Shift of D: income, tastes, prices of substitutes/complements changed."] },
            ],
            viz: "shiftDemandRight",
            vizCaption: "A shift is a new curve — not the same line sliding on itself.",
          },
          {
            title: "What you will do next in class",
            lead: "Practice: draw shifts, find new equilibrium, tell a short story in words.",
            blocks: [
              { type: "p", text: "Always name: which curve moves, which direction, what happens to P* and Q*." },
            ],
            viz: "equilibrium",
          },
        ],
      };
    </script>
    <script src="js/lecture-shell.js" defer></script>
  </body>
</html>
