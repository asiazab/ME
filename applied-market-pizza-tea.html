    <nav class="nav-bar" aria-label="Step navigation">

        <button type="button" class="nav-btn nav-btn-primary" id="btn-next">Next →</button>
      </div>
    </nav>
    <script>
      window.LECTURE = {
        course: "Lecture 3 · Applied Market Analysis",
        title: "Pizza & Lipton tea",
        subtitle: "From “Applied Market Analysis Question For Pizza Market” — step by step",
        steps: [
          {
            title: "How to read these questions",
            lead: "This is your Lecture 3 worksheet. Start from equilibrium: did a curve shift, or are you moving along?",
            blocks: [
              {
                type: "ul",
                text: [
                  "Shift = something besides the good’s own price changed (income, tastes, input costs, taxes on sellers, etc.).",
                  "Movement along = the good’s own price changed — trace the same D or S curve.",
                ],
              },
            ],
            viz: "equilibrium",
          },
          {
            title: "1) Pizza’s own price rises",
            lead: "This is not a shift of demand — it is a change in quantity demanded.",
            blocks: [
              { type: "p", text: "Higher pizza price → move upward along the demand curve: quantity demanded falls." },
              { type: "p", text: "Suppliers move along supply: higher price raises quantity supplied." },
            ],
            viz: "demandCurve",
            vizCaption: "Own-price change → slide along the curves toward a new intersection story.",
          },
          {
            title: "2) Burgers (substitute) get pricier",
            lead: "Pizza looks relatively cheaper — people want more pizza at each pizza price.",
            blocks: [{ type: "p", text: "Demand for pizza shifts right. Equilibrium price and quantity of pizza both tend to rise." }],
            viz: "shiftDemandRight",
          },
          {
            title: "3) Cheese (input) costs rise",
            lead: "Production is more expensive at every output level.",
            blocks: [{ type: "p", text: "Supply of pizza shifts left. Price tends to rise, quantity tends to fall." }],
            viz: "shiftSupplyLeft",
          },
          {
            title: "4) Income rises — pizza is normal",
            lead: "Normal good: you buy more when you are richer.",
            blocks: [{ type: "p", text: "Demand shifts right. Equilibrium price and quantity both tend to rise." }],
            viz: "shiftDemandRight",
          },
          {
            title: "5) Tax on restaurants",
            lead: "Treat it like higher costs of serving meals — supply side story (often).",
            blocks: [
              {
                type: "p",
                text: "Supply shifts left (or a parallel upward shift in the supply curve). Consumer price rises; quantity falls.",
              },
            ],
            viz: "shiftSupplyLeft",
          },
          {
            title: "6) Price fixed above equilibrium",
            lead: "A price floor that actually binds.",
            blocks: [
              { type: "p", text: "At a high fixed price, quantity supplied exceeds quantity demanded → surplus." },
            ],
            viz: "priceFloor",
          },
          {
            title: "7) Price fixed below equilibrium",
            lead: "A binding price ceiling.",
            blocks: [{ type: "p", text: "At a low fixed price, quantity demanded exceeds quantity supplied → shortage." }],
            viz: "priceCeiling",
          },
          {
            title: "8) Health awareness cuts fast food",
            lead: "Preferences move against pizza.",
            blocks: [{ type: "p", text: "Demand shifts left. Price and quantity both tend to fall." }],
            viz: "shiftDemandLeft",
          },
          {
            title: "9) New machines cut production cost",
            lead: "Cheaper to make each pizza.",
            blocks: [{ type: "p", text: "Supply shifts right. Price tends to fall; quantity tends to rise." }],
            viz: "shiftSupplyRight",
          },
          {
            title: "10) Taste shifts to burgers + electricity cheaper",
            lead: "Two shocks at once — split the story, then combine.",
            blocks: [
              {
                type: "ul",
                text: [
                  "Taste toward burgers → pizza demand shifts left.",
                  "Cheaper electricity → pizza supply shifts right.",
                  "Price of pizza usually falls; quantity can go either way unless you know how strong each shock is.",
                ],
              },
            ],
            viz: "equilibrium",
            vizCaption: "Demand left + supply right → price usually falls; quantity is ambiguous.",
          },
          {
            title: "Lipton tea — same toolkit",
            lead: "Coffee is a substitute; tea leaves are an input; imports taxes hit costs.",
            blocks: [
              {
                type: "ul",
                text: [
                  "Tea’s own price up/down → move along demand & supply.",
                  "Coffee pricier → tea demand shifts right.",
                  "Tea leaves pricier → tea supply shifts left.",
                  "Import tax on leaves → supply shifts left.",
                  "Cold weather increases taste → demand shifts right.",
                ],
              },
            ],
            viz: "market",
          },
          {
            title: "You are allowed to go slow",
            lead: "Draw D and S, label the shock, narrate in one sentence.",
            blocks: [
              {
                type: "tip",
                text: "Exam sentences: “Demand shifts left because…” beats a mystery graph with no explanation.",
              },
            ],
            viz: "welcome",
          },
        ],
      };
    </script>
    <script src="js/lecture-shell.js" defer></script>
  </body>
